# develop: redis + get_remains + bot
services:
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6380:6379"

  telegram-ai-agent:
    build: .
    container_name: telegram-ai-agent
    command: ["python", "-m", "run"]
    env_file: 
      - .env
    depends_on:
      # - get-remains
      - redis
    volumes:
      - .:/app
      - ./logs:/app/logs
    restart: always